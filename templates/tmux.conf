set -g status off
set -g prefix None
unbind-key C-b
set -g mouse on
bind-key -n MouseDown1Pane select-pane -t = \; run-shell -b '@WS_BIN@ mark-attention "#{session_name}" read' \; send-keys -M
bind-key -n C-r run-shell -b '@WS_BIN@ toggle-attention "#{session_name}"'
bind-key -n M-r run-shell -b '@WS_BIN@ toggle-attention "#{session_name}"'
set -g focus-events on
set -s extended-keys always
set -s extended-keys-format csi-u
set -as terminal-features ',xterm-ghostty:extkeys'
set -g set-clipboard on
set -g allow-passthrough on
set -g history-limit 100000
set -g remain-on-exit off
set -g set-titles off
